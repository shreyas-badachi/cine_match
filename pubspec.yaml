name: cine_match
description: "A movie discovery app where groups can find movies they all want to watch."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management + DI (one library does both)
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Local database (reactive — Streams power the live Matches page)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.0

  # Navigation
  go_router: ^14.6.2

  # UI / UX polish
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  gap: ^3.0.1
  google_fonts: ^6.2.1

  # Pagination (v4 — stable API; v5 introduced breaking changes)
  infinite_scroll_pagination: ^4.1.0

  # Connectivity + background sync
  connectivity_plus: ^6.1.0
  workmanager: ^0.9.0+3

  # Config / secrets
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Drift code generation
  drift_dev: ^2.20.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  assets:
    - .env
